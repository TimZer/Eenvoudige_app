<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slaaptracker</title>
    <link rel="stylesheet" href="opmaak/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">

</head>
<body>
    
    <!-- Hoofd titel van de app -->
    <header>

        <h1 data-key="title"></h1>

        <p data-key="subtitle">
            Houd eenvoudig je slaapuren bij.
        </p>

    </header>

    <!-- Inhoud van de pagina -->
    <main>

        <!-- Kaart voor invoer -->
        <section class="kaart">

            <h2 data-key="newSleep"></h2>

            <!-- Begintijd -->
            <label for="beginTijd" data-key="bedtimeLabel">

            </label>

            <input
                type="time"
                id="beginTijd"
            >

            <!-- Eindtijd -->
            <label for="eindTijd" data-key="wakeLabel">

            </label>

            <input
                type="time"
                id="eindTijd"
            >

            <!-- Opslaan knop -->
            <button id="opslaanKnop" data-key="save">

                Registratie opslaan

            </button>

            <!-- Verwijder knop -->
            <button id="verwijderKnop" data-key="deleteAll">

                Alle gegevens verwijderen

            </button>

        </section>

        <!-- Overzicht van registraties -->
        <section class="kaart">

            <h2 data-key="stats"></h2>

            <div id="overzichtVak">

            </div>

        </section>

        <!-- Statistieken -->
        <section class="kaart">

            <h2 data-key="stats"></h2>

            <p>

                Gemiddelde slaap:
                <span data-key="avgSleepLabel"></span>
                <span id="gemiddeldeSlaap">

                    0

                </span>
                uur

            </p>

            <p>

                Kortste slaap:
                <span id="minimumSlaap">

                    0

                </span>
                uur

            </p>

            <p>

                Langste slaap:
                <span id="maximumSlaap">

                    0

                </span>
                uur

            </p>

        </section>

    </main>



    <!-- Bestand met taaldata -->
    <script src="script.js"></script>
    <!-- Bestand met berekeningen -->
    <script src="javascript/berekening.js"></script>
    <!-- Bestand voor LocalStorage -->
    <script src="javascript/opslag.js"></script>
    <!-- Bestand voor schermweergave -->
    <script src="javascript/schermweergave.js"></script>
    <!-- Hoofdprogramma -->
    <script src="javascript/hoofdprogramma.js"></script>

        <!-- Knop om taal te wisselen -->
     <button onclick="switchLang()" id="taalKnop">
        Wissel taal
    </button>   

<footer>
    <p>&copy; 2026 Slaaptracker. Alle rechten voorbehouden.</p>
</footer>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
