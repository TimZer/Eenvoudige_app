<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaaptracker</title>

     <script>
        window.addEventListener("load", async () => {
            if (!("serviceWorker" in navigator)) {
                return;
            }

            try {
                await navigator.serviceWorker.register("../serviceworker.js");
                console.log("Service worker registered.");
            }

            catch (error) {
                console.error("Service worker registration failed.", error);
            }
        });
    </script>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="opmaak/style.css">
    <link rel="manifest" href="manifest.json">
    <meta  name="theme-color"content="#2563eb">

</head>
<body class="bg-light">
    <!-- Header -->
    <header class="container mt-4">
        <div class="bg-primary text-white p-4 rounded shadow">
            <h1
                class="text-center"
                data-key="title"
            >
                Slaaptracker
            </h1>
            <p
                class="text-center mb-0"
                data-key="subtitle"
            >
                Houd eenvoudig je slaapuren bij.
            </p>
        </div>
    </header>

    <!-- Hoofdinhoud -->
    <main class="container mt-4">

        <!-- Invoerkaart -->
        <section class="card shadow-sm mb-4">
            <div class="card-body">
                <h2
                    class="h4 text-primary"
                    data-key="newSleep"
                >
                    Nieuwe registratie
                </h2>

                <!-- Begintijd -->
                <label
                    for="beginTijd"
                    class="form-label mt-3"
                    data-key="bedtimeLabel"
                >
                    Bedtijd
                </label>

                <input
                    type="time"
                    id="beginTijd"
                    class="form-control"
                >

                <!-- Eindtijd -->
                <label
                    for="eindTijd"
                    class="form-label mt-3"
                    data-key="wakeLabel"
                >
                    Opstaantijd
                </label>

                <input
                    type="time"
                    id="eindTijd"
                    class="form-control"
                >

                <!-- Opslaan knop -->
                <button
                    id="opslaanKnop"
                    class="btn btn-primary w-100 mt-3"
                    data-key="save"
                >
                    Registratie opslaan
                </button>

                <!-- Verwijderen knop -->
                <button
                    id="verwijderKnop"
                    class="btn btn-danger w-100 mt-2"
                    data-key="deleteAll"
                >
                    Alle gegevens verwijderen
                </button>
            </div>
        </section>
        
        <!-- Overzicht -->
        <section class="card shadow-sm mb-4">
            <div class="card-body">
                <h2
                    class="h4 text-primary"
                    data-key="stats"
                >
                    Overzicht
                </h2>
                <div id="overzichtVak">
                </div>
            </div>
        </section>

        <!-- Statistieken -->
        <section class="card shadow-sm mb-4">
            <div class="card-body">
                <h2
                    class="h4 text-primary"
                    data-key="stats"
                >
                    Statistieken
                </h2>
                        <p>
                            <span data-key="avgSleepLabel">
                                Gemiddelde slaap:
                            </span>
                            <span id="gemiddeldeSlaap">
                                0
                            </span>
                            uur
                        </p>

                        <p>
                            <span data-key="shortestSleepLabel">
                                Kortste slaap:
                            </span>
                            <span id="minimumSlaap">
                                0
                            </span>
                            uur
                        </p>

                        <p>
                            <span data-key="longestSleepLabel">
                                Langste slaap:
                            </span>
                            <span id="maximumSlaap">
                                0
                            </span>
                            uur
                        </p>
            </div>
        </section>

        <!-- Taalknop -->
        <button
            onclick="switchLang()"
            id="taalKnop"
            class="btn btn-secondary"
        >
            Wissel taal
        </button>

    </main>

    <!-- Footer -->
    <footer class="text-center mt-5 mb-3">
        <p>&copy; 2026 Slaaptracker. GG WE WIN.</p>
    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="javascript/berekening.js"></script>
    <script src="javascript/opslag.js"></script>
    <script src="javascript/schermweergave.js"></script>
    <script src="javascript/hoofdprogramma.js"></script>


</body>
</html>
