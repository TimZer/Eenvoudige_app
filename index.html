<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaaptracker</title>

<head>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link
        rel="stylesheet"
        href="opmaak/style.css"
    >
    <link
        rel="manifest"
        href="manifest.json"
    >
    <meta
        name="theme-color"
        content="#2563eb"
    >

</head>

<body class="bg-light">

    <!-- Header -->
    <header class="container mt-4">

        <div class="bg-primary text-white p-4 rounded shadow">

            <h1
                class="text-center"
                data-key="title"
            >
                Slaaptracker
            </h1>

            <p
                class="text-center mb-0"
                data-key="subtitle"
            >
                Houd eenvoudig je slaapuren bij.
            </p>

        </div>

    </header>

    <!-- Hoofdinhoud -->
    <main class="container mt-4">

        <!-- Invoerkaart -->
        <section class="card shadow-sm mb-4">

            <div class="card-body">

                <h2
                    class="h4 text-primary"
                    data-key="newSleep"
                >
                    Nieuwe registratie
                </h2>

                <!-- Begintijd -->
                <label
                    for="beginTijd"
                    class="form-label mt-3"
                    data-key="bedtimeLabel"
                >
                    Bedtijd
                </label>

                <input
                    type="time"
                    id="beginTijd"
                    class="form-control"
                >

                <!-- Eindtijd -->
                <label
                    for="eindTijd"
                    class="form-label mt-3"
                    data-key="wakeLabel"
                >
                    Opstaantijd
                </label>

                <input
                    type="time"
                    id="eindTijd"
                    class="form-control"
                >

                <!-- Opslaan knop -->
                <button
                    id="opslaanKnop"
                    class="btn btn-primary w-100 mt-3"
                    data-key="save"
                >
                    Registratie opslaan
                </button>

                <!-- Verwijderen knop -->
                <button
                    id="verwijderKnop"
                    class="btn btn-danger w-100 mt-2"
                    data-key="deleteAll"
                >
                    Alle gegevens verwijderen
                </button>

            </div>

        </section>

        <!-- Overzicht -->
        <section class="card shadow-sm mb-4">

            <div class="card-body">

                <h2
                    class="h4 text-primary"
                    data-key="stats"
                >
                    Overzicht
                </h2>

                <div id="overzichtVak">

                </div>

            </div>

        </section>

        <!-- Statistieken -->
        <section class="card shadow-sm mb-4">

            <div class="card-body">

                <h2
                    class="h4 text-primary"
                    data-key="stats"
                >
                    Statistieken
                </h2>

                <p>

                    Gemiddelde slaap:

                    <strong id="gemiddeldeSlaap">
                        0
                    </strong>

                    uur

                </p>

                <p>

                    Kortste slaap:

                    <strong id="minimumSlaap">
                        0
                    </strong>

                    uur

                </p>

                <p>

                    Langste slaap:

                    <strong id="maximumSlaap">
                        0
                    </strong>

                    uur

                </p>

            </div>

        </section>

        <!-- Taalknop -->
        <button
            onclick="switchLang()"
            id="taalKnop"
            class="btn btn-secondary"
        >
            Wissel taal
        </button>

    </main>

    <!-- Footer -->
    <footer class="text-center mt-5 mb-3">

        <p>
            &copy; 2026 Slaaptracker.
            Alle rechten voorbehouden.
        </p>

    </footer>

    <!-- Scripts -->
    <script src="script.js"></script>

    <script src="javascript/berekening.js"></script>

    <script src="javascript/opslag.js"></script>

    <script src="javascript/schermweergave.js"></script>

    <script src="javascript/hoofdprogramma.js"></script>

    <!-- Service Worker -->
    <script>

        if (
            "serviceWorker" in navigator
        ) {

            navigator.serviceWorker.register(
                "service-worker.js"
            );

        }

    </script>

</body>

</html>
